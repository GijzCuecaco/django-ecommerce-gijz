{% extends 'homepage/base.html' %}

{% block title %}Logged Out — My Shop{% endblock %}

{% block content %}
<div style="text-align: center; padding: 60px 20px;">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div style="padding: 40px;">
            <i class="fas fa-check-circle" style="font-size: 48px; color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Logged Out Successfully</h2>
            <p style="color: var(--text-muted); margin: 20px 0;">You have been logged out.</p>
            <a href="{% url 'product_list' %}" class="btn primary" style="display: inline-block; padding: 12px 30px;">
                <i class="fas fa-arrow-left"></i> Back to Shop
            </a>
        </div>
    </div>
</div>
{% endblock %}
