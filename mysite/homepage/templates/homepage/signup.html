{% extends 'homepage/base.html' %}

{% block title %}Sign Up — My Shop{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow" style="max-width: 500px; margin: 60px auto;">
                <div class="card-header" style="background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px;">
                    <h2 style="margin: 0;">Create Account</h2>
                    <p style="margin: 8px 0 0 0; opacity: 0.9;">Join us to start shopping!</p>
                </div>
                <div class="card-body" style="padding: 30px;">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Username</label>
                            <input type="text" name="username" placeholder="Choose a username" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-primary);">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Email</label>
                            <input type="email" name="email" placeholder="Enter your email" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-primary);">
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Password</label>
                            <input type="password" name="password" placeholder="At least 6 characters" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-primary);">
                        </div>
                        
                        <div style="margin-bottom: 24px;">
                            <label style="display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-primary);">Confirm Password</label>
                            <input type="password" name="password_confirm" placeholder="Repeat your password" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; background: transparent; color: var(--text-primary);">
                        </div>
                        
                        <button type="submit" class="btn primary" style="width: 100%; padding: 12px;">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                    </form>
                </div>
                <div class="card-footer" style="text-align: center; padding: 20px; border-top: 1px solid var(--border-color); background: rgba(99, 102, 241, 0.03);">
                    <p style="margin: 0; font-size: 14px;">Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
